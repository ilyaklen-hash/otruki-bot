<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ОТ РУКИ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:  #ECEEE5;
      --ink: #1C1C1A;
      --dim: #7A7A6E;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 40px 24px;
      gap: 0;
    }

    .logo {
      width: min(280px, 72vw);
      height: auto;
      display: block;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 13px;
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.03em;
      margin-bottom: 52px;
      text-align: center;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 400px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      padding: 18px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    .link-btn:hover  { transform: translateY(-2px); opacity: 0.85; }
    .link-btn:active { transform: translateY(0);    opacity: 0.7;  }

    .link-btn--main {
      background: var(--ink);
      color: var(--bg);
    }

    .link-btn--tg {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(0,0,0,0.10);
    }

    .link-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .link-btn-text { flex: 1; }
    .link-btn-sub  {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.45;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .arrow {
      opacity: 0.3;
      font-size: 18px;
      line-height: 1;
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--dim);
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="ОТ РУКИ" class="logo">
  <p class="tagline">Школа графики · Москва</p>

  <div class="links">

    <!-- Лендинг -->
    <a href="https://otruki.netlify.app/" class="link-btn link-btn--main">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="link-btn-text">
        Наш сайт
        <span class="link-btn-sub">otruki.netlify.app</span>
      </span>
      <span class="arrow">›</span>
    </a>

    <!-- Записаться -->
    <a href="https://n2037117.yclients.com" class="link-btn link-btn--main">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="link-btn-text">
        Записаться
        <span class="link-btn-sub">онлайн-запись</span>
      </span>
      <span class="arrow">›</span>
    </a>

    <!-- Telegram-канал -->
    <a href="https://t.me/shkolaotruki" class="link-btn link-btn--tg">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
      <span class="link-btn-text">
        Telegram-канал
        <span class="link-btn-sub">@shkolaotruki</span>
      </span>
      <span class="arrow">›</span>
    </a>

  </div>

  <footer>© 2026 ОТ РУКИ</footer>

</body>
</html>
